<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- iOS: run fullscreen (no Safari chrome) when launched from Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Claude Monitor" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0b" />
  <!-- Home Screen / PWA icons -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Claude Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --card: #18181b;
      --card-border: #27272a;
      --text: #e4e4e7;
      --muted: #71717a;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --scale: 1;            /* card size multiplier, set from localStorage */
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      /* Keep the header clear of the notch / status bar in standalone mode */
      padding-top: env(safe-area-inset-top, 0px);
      padding-left: calc(16px + env(safe-area-inset-left, 0px));
      padding-right: calc(16px + env(safe-area-inset-right, 0px));
      padding-bottom: 0;
      z-index: 10;
      background: linear-gradient(var(--bg), rgba(10,10,11,0.85) 70%, rgba(10,10,11,0));
    }

    #conn {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    #conn-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    #conn-dot.online { background: var(--green); }

    #topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tbtn {
      background: var(--card);
      border: 1px solid var(--card-border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      line-height: 1.2;
    }
    .tbtn:active { opacity: 0.7; }

    /* Settings popover */
    #panel {
      position: fixed;
      top: calc(48px + env(safe-area-inset-top, 0px));
      right: calc(12px + env(safe-area-inset-right, 0px));
      z-index: 20;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px;
      width: 240px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: none;
    }
    #panel.open { display: block; }
    #panel h3 {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      font-weight: 600;
    }
    #panel .row { margin-bottom: 14px; }
    #panel label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      gap: 10px;
    }
    #panel input[type="range"] { width: 100%; margin-top: 8px; accent-color: var(--green); }
    #panel input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--green); }
    #size-val { color: var(--muted); font-variant-numeric: tabular-nums; }
    #panel .reset {
      width: 100%;
      margin-top: 4px;
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--muted);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    #grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      /* Clear the fixed header + notch / home indicator on all sides */
      padding-top: calc(56px + env(safe-area-inset-top, 0px));
      padding-left: calc(16px + env(safe-area-inset-left, 0px));
      padding-right: calc(16px + env(safe-area-inset-right, 0px));
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      align-content: flex-start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: calc(16px * var(--scale)) calc(18px * var(--scale));
      min-width: calc(220px * var(--scale));
      flex: 0 1 calc(260px * var(--scale));
      display: flex;
      flex-direction: column;
      gap: calc(8px * var(--scale));
    }

    /* Full-width mode: one card stretches the full row */
    #grid.full-width .card {
      flex-basis: 100%;
      min-width: 0;
      width: 100%;
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: calc(12px * var(--scale));
    }

    .dot {
      width: calc(22px * var(--scale)); height: calc(22px * var(--scale));
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.free    { background: var(--green); }
    .dot.working { background: var(--yellow); animation: pulse 1.4s ease-in-out infinite; }
    .dot.waiting { background: var(--red);    animation: pulse 1.0s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.0); opacity: 1; }
      50%      { box-shadow: 0 0 0 8px rgba(255,255,255,0.0); opacity: 0.55; }
    }

    .status-label {
      font-size: calc(13px * var(--scale));
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-label.free    { color: var(--green); }
    .status-label.working { color: var(--yellow); }
    .status-label.waiting { color: var(--red); }

    .project {
      font-size: calc(17px * var(--scale));
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conversation {
      font-size: calc(13px * var(--scale));
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta {
      font-size: calc(11px * var(--scale));
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 2px;
    }
    .sid { font-family: ui-monospace, Menlo, monospace; }

    /* Token usage bar */
    .tokens { margin-top: calc(4px * var(--scale)); }
    .tokens.hidden { display: none; }
    .token-bar {
      height: calc(6px * var(--scale));
      border-radius: 999px;
      background: #27272a;
      overflow: hidden;
    }
    .token-fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: var(--green);
      transition: width 0.4s ease, background 0.4s ease;
    }
    .token-fill.mid  { background: var(--yellow); }
    .token-fill.high { background: var(--red); }
    .token-text {
      font-size: calc(11px * var(--scale));
      color: var(--muted);
      margin-top: calc(3px * var(--scale));
      font-variant-numeric: tabular-nums;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    /* Plan-usage strip (mirrors `/usage`) — sits full-width atop the grid */
    .usage-strip {
      flex-basis: 100%;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: calc(12px * var(--scale)) calc(16px * var(--scale));
      display: flex;
      flex-direction: column;
      gap: calc(10px * var(--scale));
    }
    .usage-head { display: flex; align-items: center; gap: 10px; }
    .usage-head .label {
      font-size: calc(12px * var(--scale));
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .usage-refresh {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text);
      border-radius: 6px;
      width: calc(24px * var(--scale)); height: calc(24px * var(--scale));
      font-size: calc(13px * var(--scale));
      cursor: pointer;
      line-height: 1;
    }
    .usage-refresh:active { opacity: 0.6; }
    .usage-refresh.spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .usage-updated {
      margin-left: auto;
      font-size: calc(11px * var(--scale));
      color: var(--muted);
    }
    .usage-gauges { display: flex; flex-wrap: wrap; gap: calc(18px * var(--scale)); }
    .gauge {
      flex: 1 1 calc(190px * var(--scale));
      min-width: calc(150px * var(--scale));
    }
    .gauge .g-top {
      display: flex;
      justify-content: space-between;
      font-size: calc(12px * var(--scale));
      margin-bottom: calc(4px * var(--scale));
    }
    .gauge .g-pct { font-variant-numeric: tabular-nums; color: var(--muted); }
    .gauge .g-bar {
      height: calc(8px * var(--scale));
      border-radius: 999px;
      background: #27272a;
      overflow: hidden;
    }
    .gauge .g-fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: var(--green);
      transition: width 0.4s ease, background 0.4s ease;
    }
    .gauge .g-fill.mid  { background: var(--yellow); }
    .gauge .g-fill.high { background: var(--red); }
    .gauge .g-reset {
      font-size: calc(10px * var(--scale));
      color: var(--muted);
      margin-top: calc(3px * var(--scale));
    }
    .usage-msg { font-size: calc(12px * var(--scale)); color: var(--muted); }

    #empty {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 20px;
      pointer-events: none;
    }
    #empty.hidden { display: none; }
  </style>
</head>
<body>
  <div id="topbar">
    <div id="conn">
      <span id="conn-dot"></span>
      <span id="conn-text">connecting…</span>
    </div>
    <div id="topbar-right">
      <button id="settings-btn" class="tbtn">⚙</button>
      <button id="fs-btn" class="tbtn">⛶ Fullscreen</button>
    </div>
  </div>

  <div id="panel">
    <h3>Display settings</h3>
    <div class="row">
      <label>Size <span id="size-val">100%</span></label>
      <input id="size-range" type="range" min="60" max="200" step="5" value="100" />
    </div>
    <div class="row">
      <label>Full width (1 card per row)
        <input id="fw-check" type="checkbox" />
      </label>
    </div>
    <div class="row">
      <label>Show token usage
        <input id="tok-check" type="checkbox" />
      </label>
    </div>
    <div class="row">
      <label>Show plan usage
        <input id="use-check" type="checkbox" />
      </label>
    </div>
    <button class="reset" id="reset-btn">Reset to defaults</button>
  </div>

  <div id="grid"></div>
  <div id="empty">No active sessions</div>

  <script>
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const connDot = document.getElementById('conn-dot');
    const connText = document.getElementById('conn-text');
    const fsBtn = document.getElementById('fs-btn');

    // ---- Settings (persisted to localStorage) ----
    const STORE_KEY = 'claude-monitor-settings';
    const panel = document.getElementById('panel');
    const settingsBtn = document.getElementById('settings-btn');
    const sizeRange = document.getElementById('size-range');
    const sizeVal = document.getElementById('size-val');
    const fwCheck = document.getElementById('fw-check');
    const tokCheck = document.getElementById('tok-check');
    const useCheck = document.getElementById('use-check');
    const resetBtn = document.getElementById('reset-btn');

    const DEFAULTS = { scale: 100, fullWidth: false, showTokens: true, showUsage: true };
    let settings = loadSettings();

    function loadSettings() {
      try {
        const s = JSON.parse(localStorage.getItem(STORE_KEY)) || {};
        return {
          scale: typeof s.scale === 'number' ? s.scale : DEFAULTS.scale,
          fullWidth: !!s.fullWidth,
          showTokens: s.showTokens !== undefined ? !!s.showTokens : DEFAULTS.showTokens,
          showUsage: s.showUsage !== undefined ? !!s.showUsage : DEFAULTS.showUsage,
        };
      } catch (e) {
        return { ...DEFAULTS };
      }
    }
    function saveSettings() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(settings)); } catch (e) {}
    }
    function applySettings() {
      document.documentElement.style.setProperty('--scale', (settings.scale / 100).toFixed(2));
      grid.classList.toggle('full-width', settings.fullWidth);
      sizeRange.value = settings.scale;
      sizeVal.textContent = settings.scale + '%';
      fwCheck.checked = settings.fullWidth;
      tokCheck.checked = settings.showTokens;
      useCheck.checked = settings.showUsage;
    }

    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      panel.classList.toggle('open');
    });
    // Tap outside the panel to close it
    document.addEventListener('click', (e) => {
      if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== settingsBtn) {
        panel.classList.remove('open');
      }
    });
    sizeRange.addEventListener('input', () => {
      settings.scale = parseInt(sizeRange.value, 10);
      applySettings();
      saveSettings();
    });
    fwCheck.addEventListener('change', () => {
      settings.fullWidth = fwCheck.checked;
      applySettings();
      saveSettings();
    });
    tokCheck.addEventListener('change', () => {
      settings.showTokens = tokCheck.checked;
      applySettings();
      saveSettings();
      render(lastSessions);
    });
    useCheck.addEventListener('change', () => {
      settings.showUsage = useCheck.checked;
      applySettings();
      saveSettings();
      render(lastSessions);
    });
    resetBtn.addEventListener('click', () => {
      settings = { ...DEFAULTS };
      applySettings();
      saveSettings();
    });

    applySettings();

    // ---- Fullscreen ----
    const fsSupported = !!(document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen);
    // Already running as a Home-Screen app? Hide the button entirely.
    const isStandalone = window.navigator.standalone === true
      || window.matchMedia('(display-mode: standalone)').matches;

    if (isStandalone) {
      fsBtn.style.display = 'none';
    } else if (!fsSupported) {
      // iPhone Safari: no Fullscreen API. Guide the user to install as an app.
      fsBtn.textContent = '⤓ Fullscreen';
      fsBtn.addEventListener('click', () => {
        alert('iPhone Safari does not allow fullscreen.\n\nTo run TRULY fullscreen:\n1. Tap the Share button (square with an arrow) in Safari\'s bottom bar\n2. Choose "Add to Home Screen"\n3. Open the new app from your Home Screen — it runs fullscreen with no address bar.');
      });
    } else {
      fsBtn.addEventListener('click', () => {
        const el = document.documentElement;
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
        } else {
          (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        }
      });
    }

    // ---- Wake Lock ----
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => { wakeLock = null; });
        }
      } catch (e) { /* ignore */ }
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
    requestWakeLock();

    // ---- Time formatting ----
    function timeAgo(ts) {
      const s = Math.floor((Date.now() - ts) / 1000);
      if (s < 5) return 'just now';
      if (s < 60) return s + 's ago';
      const m = Math.floor(s / 60);
      return m + 'm ago';
    }

    function render(sessions) {
      empty.classList.toggle('hidden', sessions.length > 0);
      grid.innerHTML = usageHtml();
      for (const s of sessions) {
        const status = ['free', 'working', 'waiting'].includes(s.status) ? s.status : 'free';
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = s.session_id;
        card.innerHTML = `
          <div class="card-head">
            <div class="dot ${status}"></div>
            <div class="status-label ${status}">${status}</div>
          </div>
          <div class="project">${escapeHtml(s.project || 'unknown')}</div>
          <div class="conversation">${escapeHtml(s.conversation || '—')}</div>
          <div class="meta">
            <span class="sid">${escapeHtml(shortId(s.session_id))}</span>
            <span>${s.lastSeen ? timeAgo(s.lastSeen) : ''}</span>
          </div>
          ${tokenHtml(s)}
        `;
        grid.appendChild(card);
      }
    }

    // Token usage bar: how full the context window is for this session.
    function tokenHtml(s) {
      if (!settings.showTokens) return '';
      const used = Number(s.tokens);
      if (!Number.isFinite(used) || used <= 0) return '';
      const pct = Math.min(100, Math.round((used / contextLimit) * 100));
      const left = Math.max(0, contextLimit - used);
      const cls = pct >= 85 ? 'high' : pct >= 60 ? 'mid' : '';
      return `
        <div class="tokens">
          <div class="token-bar"><div class="token-fill ${cls}" style="width:${pct}%"></div></div>
          <div class="token-text">
            <span>${fmtTokens(used)} / ${fmtTokens(contextLimit)} · ${pct}%</span>
            <span>${fmtTokens(left)} left</span>
          </div>
        </div>
      `;
    }

    function fmtTokens(n) {
      if (!Number.isFinite(n)) return '?';
      if (n >= 1000000) return (n / 1000000).toFixed(n >= 10000000 ? 0 : 1) + 'M';
      if (n >= 1000) return Math.round(n / 1000) + 'K';
      return String(n);
    }

    // ---- Plan usage (mirrors `/usage`) ----
    let currentUsage = null;     // { data } | { error } | null, from the server
    let usageRefreshing = false; // spin the ↻ button while a manual refresh runs

    function usageHtml() {
      if (!settings.showUsage || !currentUsage) return '';
      const refreshBtn =
        `<button class="usage-refresh ${usageRefreshing ? 'spin' : ''}" title="Refresh">↻</button>`;

      if (currentUsage.error) {
        const msg = {
          'no-credentials': 'Sign in to Claude Code to see plan usage',
          'expired': 'Token expired — open Claude Code to refresh it',
          'unsupported-platform': '',  // hide entirely off macOS
          'disabled': '',
        };
        const text = msg[currentUsage.error];
        if (text === '' ) return '';
        return `<div class="usage-strip">
          <div class="usage-head"><span class="label">Plan usage</span>${refreshBtn}</div>
          <div class="usage-msg">${escapeHtml(text || 'Plan usage unavailable')}</div>
        </div>`;
      }

      const d = currentUsage.data || {};
      const defs = [
        ['five_hour', 'Session · 5h'],
        ['seven_day', 'Week · all'],
        ['seven_day_opus', 'Week · Opus'],
        ['seven_day_sonnet', 'Week · Sonnet'],
      ];
      const gauges = defs.map(([key, label]) => {
        const o = d[key];
        if (!o || typeof o.utilization !== 'number') return '';
        const pct = Math.round(o.utilization);
        const cls = pct >= 85 ? 'high' : pct >= 60 ? 'mid' : '';
        const reset = resetText(o.resets_at);
        return `<div class="gauge">
          <div class="g-top"><span>${label}</span><span class="g-pct">${pct}%</span></div>
          <div class="g-bar"><div class="g-fill ${cls}" style="width:${Math.min(100, pct)}%"></div></div>
          ${reset ? `<div class="g-reset">${reset}</div>` : ''}
        </div>`;
      }).filter(Boolean).join('');

      if (!gauges) return '';
      const updated = currentUsage.fetchedAt ? 'updated ' + timeAgo(currentUsage.fetchedAt) : '';
      return `<div class="usage-strip">
        <div class="usage-head">
          <span class="label">Plan usage</span>${refreshBtn}
          <span class="usage-updated">${updated}</span>
        </div>
        <div class="usage-gauges">${gauges}</div>
      </div>`;
    }

    function resetText(iso) {
      if (!iso) return '';
      const t = Date.parse(iso);
      if (isNaN(t)) return '';
      const s = Math.floor((t - Date.now()) / 1000);
      if (s <= 0) return 'resetting…';
      if (s < 86400) {
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
        return 'resets in ' + (h ? h + 'h ' : '') + m + 'm';
      }
      const dd = new Date(t);
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const hh = String(dd.getHours()).padStart(2, '0');
      const mm = String(dd.getMinutes()).padStart(2, '0');
      return 'resets ' + days[dd.getDay()] + ' ' + hh + ':' + mm;
    }

    function refreshUsage() {
      if (usageRefreshing) return;
      usageRefreshing = true;
      render(lastSessions);
      fetch('/usage').catch(() => {}).finally(() => {
        // The server broadcasts fresh usage over WS, which clears the spinner;
        // this is just a fallback in case that doesn't arrive.
        setTimeout(() => {
          if (usageRefreshing) { usageRefreshing = false; render(lastSessions); }
        }, 4000);
      });
    }

    function shortId(id) {
      if (!id) return '?';
      return id.length > 12 ? id.slice(0, 8) + '…' : id;
    }
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // ---- Tap a card to dismiss it (handy for lingering red cards) ----
    grid.addEventListener('click', (e) => {
      if (e.target.closest('.usage-refresh')) {
        e.stopPropagation();
        refreshUsage();
        return;
      }
      const card = e.target.closest('.card');
      if (!card) return;
      const id = card.dataset.id;
      if (!id) return;
      if (confirm('Dismiss this session from the dashboard?')) {
        fetch('/status/' + encodeURIComponent(id), { method: 'DELETE' }).catch(() => {});
      }
    });

    // ---- WebSocket with auto-reconnect ----
    let ws = null;
    let lastSessions = [];
    let contextLimit = 200000;  // updated from the server on each broadcast

    function connect() {
      const url = `ws://${location.host}`;
      ws = new WebSocket(url);

      ws.onopen = () => {
        connDot.classList.add('online');
        connText.textContent = 'connected';
      };
      ws.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'sessions') {
            lastSessions = msg.sessions || [];
            if (Number.isFinite(msg.contextLimit) && msg.contextLimit > 0) {
              contextLimit = msg.contextLimit;
            }
            if ('usage' in msg) {
              currentUsage = msg.usage;
              usageRefreshing = false;
            }
            render(lastSessions);
          }
        } catch (e) { /* ignore */ }
      };
      ws.onclose = () => {
        connDot.classList.remove('online');
        connText.textContent = 'reconnecting…';
        setTimeout(connect, 3000);
      };
      ws.onerror = () => { ws.close(); };
    }
    connect();

    // Refresh "time ago" labels periodically without a server push
    setInterval(() => render(lastSessions), 5000);
  </script>
</body>
</html>
